<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 96" font-family="'Noto Serif KR','Nanum Myeongjo','Apple SD Gothic Neo',serif">
  <!-- Mark (white square, black 永) -->
  <rect x="8" y="16" width="64" height="64" rx="10" fill="#fbfaf7"/>
  <text x="40" y="64" font-size="46" font-weight="700" text-anchor="middle" fill="#0a0a0a">永</text>
  <!-- Main wordmark -->
  <text x="88" y="40" font-size="26" font-weight="700" fill="#fbfaf7" letter-spacing="-0.5">永嘉會</text>
  <!-- English subtitle -->
  <text x="88" y="60" font-family="'Noto Sans KR','Pretendard',sans-serif" font-size="11" font-weight="500" fill="#fbfaf7" fill-opacity="0.7" letter-spacing="2.4">YEONGGA · ARCHIVE</text>
  <!-- Anniversary -->
  <text x="88" y="80" font-size="10" font-weight="500" fill="#fbfaf7" fill-opacity="0.55" letter-spacing="1.8">創立 45周年</text>
</svg>
